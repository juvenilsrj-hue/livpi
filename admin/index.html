<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>LIV · Administração</title>
<style>
  :root{ --bg:#ffffff; --gelo:#f6f7f9; --soft:#f1f2f5; --card:#ffffff; --ink:#24262b; --muted:#6d7178; --line:#e4e6ea; --brass:#9a7b3f; --brass2:#b8995a; --ok:#1f7a4d; --warn:#9a6a18; --bad:#9a3b2f; --info:#2f6f9a; }
  *{ box-sizing:border-box } html,body{ height:100%; margin:0 }
  body{ font-family:'Plus Jakarta Sans',system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); display:flex; flex-direction:column; overflow:hidden }
  a{ color:var(--brass) }
  /* login */
  #login{ min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px; background:var(--gelo) }
  .lbox{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:28px 26px; width:360px; box-shadow:0 14px 44px rgba(0,0,0,.08) }
  .logo{ display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:18px }
  .logo img{ height:52px } .logo .cap{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--brass) }
  #login label{ font-size:12px; color:var(--muted); display:block; margin:8px 0 -2px }
  #login input{ width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:10px; font-size:14px; background:#fff; color:var(--ink); margin-top:6px }
  #login button{ width:100%; padding:12px; border:0; border-radius:10px; background:var(--brass); color:#fff; font-weight:700; font-size:15px; cursor:pointer; margin-top:14px }
  .msg{ font-size:13px; padding:9px 11px; border-radius:9px; margin-top:12px } .msg.erro{ background:#f4e6e3; color:var(--bad) } .msg.ok{ background:#e6f2eb; color:var(--ok) }
  .pwrap{ position:relative; margin-top:6px }
  #login .pwrap input{ margin-top:0; padding-right:74px }
  #login .tog{ position:absolute; right:6px; top:50%; transform:translateY(-50%); width:auto; margin:0; padding:6px 8px; background:transparent; color:var(--brass); font-size:12px; font-weight:600; border:0; cursor:pointer }
  #login .linha{ display:flex; justify-content:flex-end; margin-top:10px } #login .linha a{ color:var(--brass); font-size:12.5px; cursor:pointer; text-decoration:none } #login .linha a:hover{ text-decoration:underline }
  #login .tit{ font-size:15px; font-weight:700; text-align:center; margin-bottom:2px }
  /* app — layout LegisHub (barra lateral + conteúdo) */
  #app{ display:none; flex-direction:row; height:100%; flex:1; min-height:0 }
  .side{ flex:0 0 212px; background:var(--card); border-right:1px solid var(--line); display:flex; flex-direction:column; overflow-y:auto; padding:12px 0 8px }
  .ws{ font-weight:700; font-size:14px; color:var(--brass); padding:4px 16px 8px; white-space:nowrap }
  .grp{ font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); padding:13px 16px 5px; font-weight:700 }
  .tab{ display:flex; align-items:center; gap:9px; text-align:left; text-decoration:none; color:var(--ink); padding:8px 16px; cursor:pointer; border:0; border-left:3px solid transparent; background:transparent; font:inherit; font-size:13px; font-weight:600; white-space:nowrap; width:100% }
  .tab .ic{ font-size:13px; width:18px; text-align:center; opacity:.85; flex:0 0 auto }
  .tab:hover{ background:var(--soft) } .tab.on{ background:#f3ead7; border-left-color:var(--brass); color:var(--brass) }
  .tab.soon{ opacity:.6 } .tab .badge{ margin-left:auto; font-size:8.5px; background:var(--soft); color:var(--muted); padding:1px 6px; border-radius:999px; font-weight:700 }
  .sidefoot{ margin-top:auto; padding:12px 12px 2px; border-top:1px solid var(--line); display:flex; align-items:center; gap:8px }
  .sidefoot .who{ font-size:11.5px; color:var(--muted); overflow:hidden; text-overflow:ellipsis }
  .sair{ margin-left:auto; text-decoration:none; color:var(--muted); font-size:12px; border:1px solid var(--line); padding:5px 10px; border-radius:8px; cursor:pointer; background:#fff }
  .main{ flex:1; min-width:0; min-height:0; display:flex; flex-direction:column }
  .main > div{ flex:1; min-height:0 }
  #view-dashboard,#view-carteira,#view-consulta,#view-processos,#view-movimentacoes,#view-tarefas,#view-pessoas,#view-financeiro,#view-automacao{ overflow-y:auto }
  .bar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:12px 20px 10px }
  /* grid de processos */
  table.grid{ width:100%; border-collapse:collapse; font-size:12.5px }
  table.grid th{ text-align:left; color:var(--muted); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; padding:8px 10px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg) }
  table.grid td{ padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top }
  table.grid tbody tr{ cursor:pointer } table.grid tbody tr:hover td{ background:var(--gelo) }
  .constru{ max-width:560px; margin:40px auto; text-align:center; color:var(--muted) } .constru .em{ font-size:38px } .constru h3{ color:var(--ink); margin:10px 0 6px } .constru .tag{ display:inline-block; font-size:11px; font-weight:700; background:#f3ead7; color:var(--brass); padding:3px 10px; border-radius:999px; margin-bottom:10px }
  select,input,button{ font-family:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink) }
  button{ background:var(--brass); color:#fff; border:0; font-weight:600; cursor:pointer }
  button.ghost{ background:#fff; color:var(--brass); border:1px solid var(--line) }
  .status{ color:var(--muted); font-size:12.5px }
  .board{ flex:1; min-height:0; display:flex; gap:10px; padding:4px 16px 14px; overflow-x:auto; overflow-y:hidden; align-items:stretch; background:var(--gelo) }
  .col{ flex:0 0 252px; background:var(--soft); border:1px solid var(--line); border-radius:12px; display:flex; flex-direction:column; max-height:100%; min-height:0 }
  .col h2{ flex:0 0 auto; font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; margin:0; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line) }
  .col h2 .hr{ display:flex; gap:7px; align-items:center } .ren{ cursor:pointer; color:var(--muted); font-size:12px } .ren:hover{ color:var(--brass) }
  .col h2 .c{ font-weight:700; color:var(--muted); font-size:11.5px; background:#fff; border-radius:999px; padding:1px 8px }
  .col .body{ padding:8px; overflow-y:auto; display:flex; flex-direction:column; gap:7px; flex:1; min-height:0 }
  /* CARD PADRONIZADO: escala de fonte única (título 12.5 / meta 11 / pílulas 10),
     título em no máx. 2 linhas, ritmo interno via flex-gap (sem margin-top solto). */
  .lead{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px; cursor:grab; box-shadow:0 1px 2px rgba(0,0,0,.04); display:flex; flex-direction:column; gap:6px }
  .lead:hover{ border-color:var(--brass2) }
  .cab{ display:flex; align-items:center; gap:8px } .mono{ width:26px;height:26px;border-radius:7px;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto }
  .nome{ flex:1; min-width:0; font-weight:700; font-size:12.5px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden }
  .meta{ color:var(--muted); font-size:11px; line-height:1.5 }
  .tags{ display:flex; gap:5px; flex-wrap:wrap; align-items:center }
  .tag{ font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; line-height:1.5; white-space:nowrap }
  .tag.indeferido{ background:#f8e8e5; color:var(--bad) } .tag.oposicao,.tag.exigencia{ background:#f7efdc; color:var(--warn) } .tag.outro{ background:#eceef1; color:var(--muted) }
  .tag.PJ{ background:#e4eef5; color:var(--info) } .tag.PF,.tag.q{ background:#eceef1; color:var(--muted) }
  .chips{ display:flex; gap:5px; flex-wrap:wrap } .chip{ font-size:10px; font-weight:700; color:#fff; padding:2px 8px; border-radius:999px; line-height:1.5 }
  .oplim{ display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; background:#e4eef5; color:var(--info) } .oplim.urg{ background:#f7efdc; color:var(--warn) } .oplim.venc{ background:#eceef1; color:#6d7178 }
  .due{ display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; background:#eceef1; color:var(--muted) } .due.atras{ background:#f8e8e5; color:var(--bad) }
  .canais{ display:flex; gap:5px; flex-wrap:wrap } .canal{ font-size:10px; font-weight:600; text-decoration:none; color:var(--brass); border:1px solid var(--line); padding:3px 8px; border-radius:7px; background:#fff }
  .canal.wa{ color:var(--ok); border-color:#cfe6d8 } .canal.ig{ color:#b03a6e; border-color:#eccfdc } .canal.em{ color:var(--info); border-color:#cfe0ec }
  .modalbg{ position:fixed; inset:0; background:rgba(34,32,28,.45); display:none; align-items:flex-start; justify-content:center; padding:28px 14px; overflow-y:auto; z-index:50 }
  .modalcard{ background:var(--bg); width:640px; max-width:100%; max-height:90vh; display:flex; flex-direction:column; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.28) }
  .mhead{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; padding:15px 18px; border-bottom:1px solid var(--line); background:var(--card); border-radius:14px 14px 0 0 }
  .mhead h3{ margin:0; font-size:17px } .mhead .s{ font-size:12px; color:var(--muted); margin-top:3px }
  .mx{ border:0; background:transparent; font-size:22px; cursor:pointer; color:var(--muted) }
  .mhead{ flex:0 0 auto }
  .mbody{ padding:16px 18px; display:flex; flex-direction:column; gap:16px; font-size:13px; line-height:1.5; flex:1 1 auto; min-height:0; overflow-y:auto }
  .sec h4{ margin:0 0 9px; font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--brass); font-weight:700 }
  .mrow{ display:flex; gap:10px; flex-wrap:wrap; align-items:center } .mrow label{ font-size:12px; color:var(--muted) }
  #mPick{ display:flex; flex-wrap:wrap; gap:6px }
  .et{ display:inline-flex; align-items:center; line-height:1.15; font-size:11px; font-weight:700; color:#fff; padding:5px 10px; border-radius:999px; cursor:pointer; border:2px solid transparent; opacity:.42; white-space:nowrap; transition:opacity .1s } .et:hover{ opacity:.7 } .et.on{ opacity:1; border-color:rgba(0,0,0,.28) }
  .mfoot{ flex:0 0 auto; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 18px; border-top:1px solid var(--line); background:var(--card); border-radius:0 0 14px 14px }
  .mfoot .autoinfo{ font-size:11px; color:var(--muted) }
  button.danger{ background:#fff; color:var(--bad); border:1px solid #ecc7c0 } button.danger:hover{ background:#fbeeeb }
  .coment{ background:var(--card); border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-size:12.5px; margin-bottom:6px } .coment .ctxt{ white-space:pre-wrap } .coment .q{ color:var(--muted); font-size:11px; margin-top:3px }
  .cedit{ cursor:pointer; color:var(--brass) } .cdel{ cursor:pointer; color:var(--bad) }
  textarea{ width:100%; border:1px solid var(--line); border-radius:9px; padding:9px; font-family:inherit; font-size:13px; min-height:54px; background:#fff; color:var(--ink) }
  .chip.alerta{ background:#f7efdc; color:var(--warn) }
  .sco{ font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; line-height:1.5; white-space:nowrap; margin-left:auto }
  .sco.quente{ background:#f8e8e5; color:var(--bad) } .sco.morno{ background:#f7efdc; color:var(--warn) } .sco.frio{ background:#eceef1; color:var(--muted) }
  .motivobox{ background:var(--gelo); border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-size:12.5px; line-height:1.55; color:var(--ink); max-height:190px; overflow-y:auto; white-space:pre-wrap }
  button.canal{ cursor:pointer } .canal.wa{ color:#1f7a4d } .canal.em{ color:var(--info) }
  .painel{ padding:26px; color:var(--muted); font-size:14px; line-height:1.7 } .painel h3{ color:var(--ink) }
  #view-dashboard, #view-carteira{ overflow-y:auto }
  .dbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:14px 26px 4px }
  .dwrap{ padding:6px 26px 40px }
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin:12px 0 }
  .panel h4{ font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--brass); margin:0 0 12px }
  .stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px }
  .stat{ border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:#fff } .stat b{ display:block; font-size:22px } .stat span{ font-size:12px; color:var(--muted) }
  .item{ border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin:8px 0; background:var(--gelo) } .item .top{ display:flex; justify-content:space-between; gap:10px; align-items:baseline } .item .m{ color:var(--muted); font-size:12.5px; margin-top:3px }
  .pill{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap }
  .pill.bom{ background:#e6f2eb; color:var(--ok) } .pill.ruim{ background:#f8e8e5; color:var(--bad) } .pill.alerta{ background:#f7efdc; color:var(--warn) } .pill.chance{ background:#e4eef5; color:var(--info) } .pill.neutro{ background:#eceef1; color:var(--muted) }
  /* gráficos (barras) + funil + projeção */
  .hbar{ display:flex; align-items:center; gap:10px; margin:7px 0; font-size:12.5px }
  .hbar .hl{ flex:0 0 200px; color:var(--muted); text-align:right }
  .hbar .ht{ flex:1; background:#eef0f3; border-radius:6px; height:20px; overflow:hidden }
  .hbar .hf{ height:100%; border-radius:6px; background:var(--brass2); min-width:2px }
  .hbar .hf.hot{ background:var(--bad) } .hbar .hf.ok{ background:var(--ok) } .hbar .hf.info{ background:var(--info) }
  .hbar .hv{ flex:0 0 84px; font-weight:700 }
  .projt{ width:100%; border-collapse:collapse; font-size:13px }
  .projt th{ text-align:left; color:var(--muted); font-weight:600; font-size:12px }
  .projt td, .projt th{ padding:7px 8px; border-bottom:1px solid var(--line) }
  .projt input{ width:110px; text-align:right }
  .bign{ font-size:26px; font-weight:800 } .bigok{ color:var(--ok) } .bigbrass{ color:var(--brass) }
  .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px }
  .kpi{ border:1px solid var(--line); border-radius:10px; padding:12px 14px; background:var(--gelo) } .kpi span{ font-size:12px; color:var(--muted); display:block; margin-top:2px }
  .destaque{ border-color:var(--brass); box-shadow:0 0 0 2px rgba(154,123,63,.12) } .lead-l{ border-left:4px solid var(--bad) }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px } @media(max-width:760px){ .grid2{ grid-template-columns:1fr } }
  .count{ font-size:12px; color:var(--muted); font-weight:600 } .more{ font-size:12px; color:var(--brass); margin-top:6px }
  .cgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px }
  .proc{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px 15px } .proc .n{ font-weight:700; font-size:15px } .proc .m{ font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.55 } .proc b{ color:var(--ink) }
  .areah{ font-size:13px; font-weight:700; color:var(--brass); text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--line); padding-bottom:5px; margin:18px 0 10px }
  details.cod{ margin:6px 26px 30px } details.cod summary{ cursor:pointer; font-weight:700; color:var(--brass) } table.cod{ width:100%; border-collapse:collapse; font-size:12.5px; margin-top:10px } table.cod td,table.cod th{ text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); vertical-align:top } table.cod th{ color:var(--muted) }
</style>
</head>
<body>

<div id="login">
  <form class="lbox" id="loginForm">
    <div class="logo"><img src="/liv_mark_dark.png" alt="LIV"><span class="cap">Administração</span></div>
    <label>E-mail</label><input type="email" id="email" autocomplete="username" autofocus>
    <label>Senha</label>
    <div class="pwrap"><input type="password" id="senha" autocomplete="current-password"><button type="button" class="tog" id="togSenha">mostrar</button></div>
    <button type="submit">Entrar</button>
    <div class="linha"><a id="esqueci">Esqueceu a senha?</a></div>
    <div id="loginMsg"></div>
  </form>

  <form class="lbox" id="resetForm" style="display:none">
    <div class="logo"><img src="/liv_mark_dark.png" alt="LIV"><span class="cap">Administração</span></div>
    <div class="tit">Definir nova senha</div>
    <label>Nova senha</label>
    <div class="pwrap"><input type="password" id="novaSenha" autocomplete="new-password"><button type="button" class="tog" id="togNova">mostrar</button></div>
    <button type="submit">Salvar senha</button>
    <div id="resetMsg"></div>
  </form>
</div>

<div id="app">
  <aside class="side">
    <div class="ws">LIV · Administração</div>
    <div class="grp">Atendimento</div>
    <button class="tab on" data-tab="leads"><span class="ic">🗂️</span>Leads / CRM</button>
    <div class="grp">Gestão processual</div>
    <button class="tab" data-tab="processos"><span class="ic">📁</span>Processos</button>
    <button class="tab soon" data-tab="movimentacoes"><span class="ic">🔔</span>Movimentações<span class="badge">em breve</span></button>
    <button class="tab soon" data-tab="tarefas"><span class="ic">✅</span>Tarefas<span class="badge">em breve</span></button>
    <button class="tab soon" data-tab="pessoas"><span class="ic">👥</span>Pessoas<span class="badge">em breve</span></button>
    <div class="grp">Indicadores</div>
    <button class="tab" data-tab="dashboard"><span class="ic">📊</span>Dashboard</button>
    <button class="tab" data-tab="carteira"><span class="ic">💼</span>Carteira</button>
    <div class="grp">Ferramentas</div>
    <button class="tab" data-tab="consulta"><span class="ic">🔍</span>Consulta INPI</button>
    <div class="grp">Financeiro</div>
    <button class="tab soon" data-tab="financeiro"><span class="ic">💰</span>Financeiro<span class="badge">em breve</span></button>
    <div class="grp">Automação</div>
    <button class="tab soon" data-tab="automacao"><span class="ic">⚙️</span>Automação<span class="badge">em breve</span></button>
    <div class="sidefoot"><span class="who" id="who"></span><button class="sair" id="sair">Sair</button></div>
  </aside>

  <main class="main">
  <div id="view-leads" style="display:flex; flex-direction:column">
    <div class="bar">
      <button id="btNovoCard">+ Novo card</button>
      <button class="ghost" id="btNovaCol">+ Coluna</button>
      <button class="ghost" id="btEnriq" title="enriquece via BrasilAPI os leads PJ/MEI filtrados">⚡ Enriquecer filtrados</button>
      <span style="width:6px"></span>
      <select id="fPessoa"><option value="">Pessoa: todas</option><option value="PJ">PJ</option><option value="PF">PF</option><option value="?">A classificar</option></select>
      <select id="fProblema"><option value="">Problema: todos</option><option value="indeferido">Indeferido</option><option value="oposicao">Oposição</option><option value="exigencia">Exigência</option></select>
      <select id="fUF" style="min-width:150px"></select>
      <select id="fEtq"><option value="">Etiqueta: todas</option></select>
      <select id="fRev"><option value="">Publicação: todas</option></select>
      <select id="fCanal"><option value="">Canal: todos</option><option value="qualquer">Com contato (e-mail/WhatsApp)</option><option value="email">Com e-mail</option><option value="whatsapp">Com WhatsApp</option><option value="instagram">Com Instagram</option><option value="google">Com Google</option></select>
      <select id="fSort"><option value="score">Ordenar: prioridade</option><option value="recente">Ordenar: mais recente</option><option value="prazo">Ordenar: prazo</option></select>
      <select id="fMostrar"><option value="ativos">Situação: ativos</option><option value="desc">Descartados</option><option value="todos">Todos</option></select>
      <span class="status">Data:</span>
      <input type="date" id="fDe" title="publicação de">
      <span class="status">até</span>
      <input type="date" id="fAte" title="publicação até">
      <input id="fTxt" placeholder="buscar titular…" style="min-width:140px">
      <button class="ghost" id="fLimpar" title="limpar filtros">Limpar</button>
      <span class="status" id="status"></span>
    </div>
    <div class="board" id="board"></div>
  </div>

  <div id="view-processos" style="display:none"></div>
  <div id="view-movimentacoes" class="painel" style="display:none"></div>
  <div id="view-tarefas" class="painel" style="display:none"></div>
  <div id="view-pessoas" class="painel" style="display:none"></div>
  <div id="view-dashboard" class="painel" style="display:none"></div>
  <div id="view-carteira" class="painel" style="display:none"></div>
  <div id="view-consulta" class="painel" style="display:none"></div>
  <div id="view-financeiro" class="painel" style="display:none"></div>

// ===== AUTH ===================================================================

sb.auth.onAuthStateChange((event)=>{ if(event==='PASSWORD_RECOVERY'){ $('#login').style.display='flex'; $('#app').style.display='none'; $('#loginForm').style.display='none'; $('#resetForm').style.display='block'; $('#novaSenha').focus(); } });

async function entrar(){
  const { data:{ session } } = await sb.auth.getSession();

// ===== DADOS ==================================================================
async function selecTudo(tabela){
  let all=[], from=0, size=1000;
  while(true){
    const { data, error } = await sb.from(tabela).select('*').range(from, from+size-1);
    if(error) throw error;
    all=all.concat(data||[]);
    if(!data || data.length<size) break;
    from+=size;
  }
  return all;
}
async function carregarTudo(){
  $('#status').textContent='carregando…';
  try{
    const [st, et, lv] = await Promise.all([
      sb.from('liv_estagios').select('*').order('ordem'),
      sb.from('liv_etiquetas').select('*'),
      selecTudo('leads'),
    ]);
    STAGES=(st.data||[]).map(s=>({key:s.key,label:s.label,cor:s.cor}));
    ETIQ=(et.data||[]).map(e=>({id:e.id,nome:e.nome,cor:e.cor}));
    LEADS=lv||[];
    $('#fEtq').innerHTML='<option value="">Etiqueta: todas</option>'+ETIQ.map(e=>'<option value="'+esc(e.id)+'">'+esc(e.nome)+'</option>').join('');
    montaPublicacoes();
    render();
  }catch(e){ $('#status').textContent='erro: '+e.message; }
}

// ===== RENDER BOARD ===========================================================
function filtros(){ return { pessoa:$('#fPessoa').value, problema:$('#fProblema').value, uf:$('#fUF').value, etq:$('#fEtq').value, rev:$('#fRev').value, canal:$('#fCanal').value, de:$('#fDe').value, ate:$('#fAte').value, txt:$('#fTxt').value.trim().toLowerCase() }; }
function isoData(s){ if(!s) return null; s=String(s); const br=s.match(/^(\d{2})\/(\d{2})\/(\d{4})/); if(br) return br[3]+'-'+br[2]+'-'+br[1]; return s.slice(0,10); }
function dataDoLead(l){ return isoData(l.data_publicacao) || isoData(l.criado_em); }
function canaisDoLead(l){ const e=l.enriquecimento||{}; return {
  email: !!(e.email && String(e.email).includes('@')),
  whatsapp: !!(e.telefone && String(e.telefone).replace(/\D/g,'').length>=10),
  instagram: true, google: true }; }
// CNPJ p/ enriquecer: completo (PJ) ou reconstruído da raiz (MEI, matriz 0001 + 2 DVs)
function cnpjDeRaiz(raiz8){ const base=raiz8+'0001'; const dv=(nums,pesos)=>{ let s=0; for(let i=0;i<pesos.length;i++) s+=(+nums[i])*pesos[i]; const r=s%11; return r<2?0:11-r; }; const d1=dv(base,[5,4,3,2,9,8,7,6,5,4,3,2]); const d2=dv(base+d1,[6,5,4,3,2,9,8,7,6,5,4,3,2]); return base+String(d1)+String(d2); }
function cnpjDoLead(l){ const d=String(l.documento||'').replace(/\D/g,''); if(l.doc_tipo==='CNPJ'&&d.length===14) return d; const raiz=String(l.cnpj_raiz||'').replace(/\D/g,''); if(raiz.length>=8) return cnpjDeRaiz(raiz.slice(0,8)); return null; }
function jaEnriquecido(l){ const e=l.enriquecimento; return !!(e && (e.telefone||e.email||e.cnpj)); }
// SCORE de prioridade: alcance (contato) + urgência (prazo) + tipo + fit
function scoreLead(l){
  let s=0; const c=canaisDoLead(l);
  if(c.whatsapp) s+=3; if(c.email) s+=2;
  if(!c.whatsapp && !c.email && cnpjDoLead(l)) s+=1;                 // enriquecível
  if(l.tipo_problema==='oposicao'||l.tipo_problema==='exigencia') s+=2;
  else if(l.tipo_problema==='indeferido') s+=1;
  const dr=l.data_limite?diasRest(l.data_limite):null;
  if(dr!=null){ if(dr>=0&&dr<=15) s+=3; else if(dr>=0&&dr<=30) s+=2; else if(dr<0) s-=1; }
  if(l.tipo_pessoa==='PJ') s+=1;
  if(l.marca) s+=1;
  return s;
}
function scoreBucket(s){ return s>=7?{k:'quente',e:'🔥'}:s>=4?{k:'morno',e:'🟠'}:{k:'frio',e:'⚪'}; }
function scoreBadge(l){ const s=scoreLead(l); const b=scoreBucket(s); return '<span class="sco '+b.k+'" title="prioridade (alcance + prazo + tipo)">'+b.e+' '+s+'</span>'; }
function passa(l,f){
  const mostra=($('#fMostrar')&&$('#fMostrar').value)||'ativos';
  if(mostra==='desc'){ if(!l.descartado) return false; } else if(mostra!=='todos'){ if(l.descartado) return false; }
  if(f.pessoa && l.tipo_pessoa!==f.pessoa) return false;
  if(f.problema && l.tipo_problema!==f.problema) return false;
  if(f.uf){ if(f.uf.indexOf('reg:')===0){ if(!(REGIOES[f.uf.slice(4)]||[]).includes(l.uf||'')) return false; } else if((l.uf||'')!==f.uf) return false; }
  if(f.etq && !(l.etiquetas||[]).includes(f.etq)) return false;
  if(f.rev && String(l.revista||'')!==f.rev) return false;
  if(f.canal){ const c=canaisDoLead(l); if(f.canal==='qualquer'){ if(!(c.email||c.whatsapp)) return false; } else if(!c[f.canal]) return false; }
  if(f.de||f.ate){ const d=dataDoLead(l); if(!d) return false; if(f.de&&d<f.de) return false; if(f.ate&&d>f.ate) return false; }
  if(f.txt && !(l.titular||'').toLowerCase().includes(f.txt)) return false;
  return true;
}
function montaPublicacoes(){
  const revs={};
  for(const l of (LEADS||[])){ if(!l.revista) continue; const r=String(l.revista); if(!(r in revs)) revs[r]=isoData(l.data_publicacao)||''; }
  const lista=Object.keys(revs).sort((a,b)=>(revs[b]||'').localeCompare(revs[a]||'')||b.localeCompare(a));
  const brDe=iso=> iso?iso.slice(8,10)+'/'+iso.slice(5,7)+'/'+iso.slice(0,4):'';
  $('#fRev').innerHTML='<option value="">Publicação: todas</option>'+lista.map(r=>'<option value="'+esc(r)+'">RPI '+esc(r)+(revs[r]?(' · '+brDe(revs[r])):'')+'</option>').join('');
}
const etqMap=()=>{ const m={}; (ETIQ||[]).forEach(e=>m[e.id]=e); return m; };
const nomeEstagio=k=>{ const s=(STAGES||[]).find(x=>x.key===k); return s?s.label:k; };
const iniciais=s=>{ const p=String(s||'?').replace(/[0-9.]/g,' ').trim().split(' ').filter(Boolean); return ((p[0]&&p[0][0]||'')+(p[1]&&p[1][0]||'')).toUpperCase()||'?'; };
const corDe=s=>{ let h=0; s=String(s||''); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%360; return 'hsl('+h+',42%,52%)'; };
const FREE_MAIL=new Set(['gmail.com','hotmail.com','outlook.com','outlook.com.br','yahoo.com','yahoo.com.br','live.com','icloud.com','bol.com.br','uol.com.br','terra.com.br','globo.com','msn.com','ig.com.br','aol.com']);
function dominioDe(l){ const e=l.enriquecimento; if(!(e&&e.email&&e.email.includes('@'))) return ''; const d=e.email.split('@')[1].trim().toLowerCase(); return FREE_MAIL.has(d)?'':d; }
function diasRest(iso){ if(!iso) return null; const h=new Date(); h.setHours(0,0,0,0); const d=new Date(iso+'T00:00:00'); return Math.round((d-h)/86400000); }
function fmtData(s){ try{ const d=new Date(s); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return s; } }
function atrasado(l){ return l.data_entrega && new Date(l.data_entrega)<new Date() && l.estagio!=='ganho' && l.estagio!=='perdido'; }
function chipsMini(l){ const m=etqMap(); const ids=l.etiquetas||[]; if(!ids.length) return ''; return '<div class="chips">'+ids.map(id=>{const e=m[id]; return e?'<span class="chip" style="background:'+e.cor+'">'+esc(e.nome)+'</span>':'';}).join('')+'</div>'; }
function limiteBadge(l){ if(!l.data_limite) return ''; const dr=diasRest(l.data_limite); const dt=new Date(l.data_limite+'T00:00:00').toLocaleDateString('pt-BR'); const cls='oplim'+(dr<0?' venc':(dr<=10?' urg':'')); return '<div><span class="'+cls+'">⚖ '+(dr<0?('oposição encerrada · '+dt):('oposição até '+dt+' · faltam '+dr+'d'))+'</span></div>'; }
function dueBadge(l){ if(!l.data_entrega) return ''; const at=atrasado(l); return '<div><span class="due'+(at?' atras':'')+'">'+(at?'⚠ Em atraso · ':'')+fmtData(l.data_entrega)+'</span></div>'; }
function canaisHTML(l){ const e=l.enriquecimento||{}; const nome=e.nomeFantasia||e.razaoSocial||l.titular||''; const wa=e.telefone?('https://wa.me/55'+String(e.telefone).replace(/[^0-9]/g,'')):''; const dom=dominioDe(l); const email=e.email||''; const ig='https://www.google.com/search?q='+encodeURIComponent('site:instagram.com '+nome); const gg='https://www.google.com/search?q='+encodeURIComponent(nome+' '+(l.uf||'')); const a=(c,h,t)=>'<a class="canal'+c+'" target="_blank" rel="noopener" href="'+h+'">'+t+'</a>'; let b=''; if(wa)b+=a(' wa',wa,'WhatsApp'); if(email)b+=a(' em','mailto:'+email,'E-mail'); b+=a(' ig',ig,'Instagram'); if(dom)b+=a('','https://'+dom,'Site'); b+=a('',gg,'Google'); return '<div class="canais">'+b+'</div>'; }
function logoBox(l){ const e=l.enriquecimento||{}; const nome=e.nomeFantasia||e.razaoSocial||l.titular||'?'; return '<span class="mono" style="background:'+corDe(nome)+'">'+esc(iniciais(nome))+'</span>'; }

// ---- MOTIVO DA RECUSA + CONTEÚDO DE ABORDAGEM -------------------------------
function saudacao(l){ const e=l.enriquecimento||{}; const raw=String(e.nomeFantasia||l.titular||'').trim().replace(/^\d[\d.\/-]*\s+/,''); if(!raw) return 'Olá!'; const w=raw.split(/\s+/)[0]; if(w.length<2) return 'Olá!'; return 'Olá, '+w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()+'!'; }
function txtAbordagem(l){
  const proc=l.numero||'', t=l.tipo_problema||'outro';
  const temMarca=l.marca && String(l.marca).trim();
  const alvo=temMarca?('a marca '+l.marca+' (processo '+proc+')'):('o seu pedido de marca (processo '+proc+')');
  const conf=(l.conflitos||[])[0]; const base=l.base?(' com base no '+l.base+' da Lei da Propriedade Industrial'):'';
  const prazo=l.data_limite?new Date(l.data_limite+'T00:00:00').toLocaleDateString('pt-BR'):null;
  const ola=saudacao(l)+' ';
  if(t==='indeferido'){
    let m=ola+'Encontramos no INPI que '+alvo+' teve o registro indeferido';
    if(conf) m+=', por ter sido considerado semelhante à marca '+conf.marca+' (processo '+conf.numero+')'+base;
    else if(l.base) m+=base;
    m+='. Essa decisão admite recurso, e existem caminhos para reverter ou reposicionar a sua marca com segurança. Podemos analisar o seu caso sem compromisso e te mostrar as opções. Quer que a gente prepare um panorama?';
    return m;
  }
  if(t==='oposicao'){
    let m=ola+'Vimos no INPI que '+alvo+' recebeu uma oposição de terceiro';
    if(prazo) m+='. Existe prazo para se manifestar (até '+prazo+'), e perder esse prazo pode custar o registro';
    m+='. Podemos cuidar da manifestação e defender a sua marca. Quer conversar sobre isso?';
    return m;
  }
  if(t==='exigencia'){
    return ola+'O INPI publicou uma exigência em '+alvo+'. É preciso responder dentro do prazo, senão o pedido pode ser arquivado. Podemos analisar a exigência e responder por você. Quer que a gente veja o que o INPI está pedindo?';
  }
  return ola+'Acompanhamos '+alvo+' no INPI e identificamos um ponto que merece atenção. Podemos te explicar sem compromisso. Quer conversar?';
}
function servLabel(c){ return c==='332'?'Oposição':c==='394'?'Recurso':c==='389'?'Pedido de registro':('serviço '+(c||'?')); }
function detalheBtnHTML(l){ if(!l.numero) return ''; return '<div class="sec"><h4>Detalhe no INPI (ao vivo)</h4><button id="mDet">🔎 Buscar detalhe no INPI</button><div id="mDetOut" style="margin-top:8px"></div></div>'; }
function detalheINPIHTML(d){

  const linhas=pet.length?pet.map(p=>'<div class="mrow" style="gap:8px;margin-top:4px"><span class="pill '+(p.servico==='332'?'ruim':'neutro')+'">'+esc(servLabel(p.servico))+'</span><span class="q">protocolo '+esc(p.protocolo)+' · '+esc(p.data||'')+(p.cliente?(' · <b>'+esc(p.cliente)+'</b>'):'')+'</span></div>').join(''):'<span class="q">sem petições listadas</span>';
  let nota='';
  if(opos) nota = opos.cliente ? ('<div style="margin-top:7px">Opoente: <b>'+esc(opos.cliente)+'</b></div>') : '<div class="q" style="margin-top:7px">Opoente ainda não é público, aparece quando a oposição é decidida.</div>';
  return '<div class="motivobox">'
    +'<div><b>Situação atual:</b> '+esc(d.situacao||'—')+'</div>'
    +(d.marca?('<div><b>Marca:</b> '+esc(d.marca)+'</div>'):'')
    +(d.apresentacao?('<div><b>Apresentação:</b> '+esc(d.apresentacao)+'</div>'):'')
    +(d.procurador?('<div><b>Procurador:</b> '+esc(d.procurador)+'</div>'):'')
    +'<div style="margin-top:7px"><b>Petições:</b></div>'+linhas+nota
    +'</div>';
}
function motivoHTML(l){
  const t=l.tipo_problema||'outro', conf=(l.conflitos||[]);
  if(!l.motivo && !conf.length) return '';
  const titulo = t==='indeferido' ? 'Motivo da recusa (INPI)' : t==='exigencia' ? 'O que o INPI está exigindo' : t==='oposicao' ? 'Oposição de terceiro' : 'Detalhe do INPI';
  let corpo='';
  if(t==='oposicao'){
    const m=String(l.motivo||'').match(/(\d{6,})\s+de\s+(\d{2}\/\d{2}\/\d{4})/);
    corpo = m
      ? '<div class="motivobox">Oposição protocolada sob nº <b>'+esc(m[1])+'</b> em '+esc(m[2])+'. Os fundamentos constam na petição do opoente e não são publicados na RPI.</div>'
      : (l.motivo ? '<div class="motivobox">'+esc(l.motivo)+'</div>' : '<div class="q" style="font-size:12px">Oposição apresentada por terceiro.</div>');
  } else {
    const chips=conf.map(c=>'<span class="chip alerta">⚠ '+esc(c.marca)+' · proc. '+esc(c.numero)+'</span>').join(' ');
    corpo = (l.base?'<span class="pill alerta" style="margin-bottom:7px;display:inline-block">'+esc(l.base)+' da LPI</span>':'')
      +(chips?('<div style="margin:2px 0 7px">'+chips+'</div>'):'')
      +(l.motivo?('<div class="motivobox">'+esc(l.motivo)+'</div>'):'');
  }
  return '<div class="sec"><h4>'+titulo+'</h4>'+corpo+'</div>';

function abordagemHTML(l){

    +'<textarea id="mAbord" style="min-height:150px;line-height:1.55">'+esc(txtAbordagem(l))+'</textarea>'
    +'<div class="mrow" style="margin-top:8px"><button id="mAbCopy">Copiar</button><button class="ghost" id="mAbReset">Regerar</button><span id="mAbWa"></span><span id="mAbMail"></span><span class="q" id="mAbOk" style="color:var(--ok)"></span></div></div>';
}
function cardHTML(l){ const t=l.tipo_problema||'outro';
  return '<div class="lead" draggable="true" data-id="'+esc(l.id)+'">'
   +'<div class="cab">'+logoBox(l)+'<div class="nome">'+esc(l.titular||'—')+'</div></div>'
   +'<div class="tags"><span class="tag '+t+'">'+esc(t)+'</span><span class="tag '+(l.tipo_pessoa==='?'?'q':esc(l.tipo_pessoa))+'">'+esc(l.tipo_pessoa)+'</span>'+scoreBadge(l)+'</div>'
   +chipsMini(l)
   +'<div class="meta">'+esc(l.marca||'(nominativa s/ figura)')+'<br>proc. '+esc(l.numero||'—')+(l.classes?(' · cl. '+esc(l.classes)):'')+(l.uf?(' · '+esc(l.uf)):'')+(l.data_evento?(' · '+esc(l.data_evento)):'')+'<br>'+esc(l.despacho||'')+'</div>'
   +limiteBadge(l)+dueBadge(l)+'</div>';
}
function ordenaLeads(arr){
  const modo=($('#fSort')&&$('#fSort').value)||'score';
  return arr.slice().sort((a,b)=>{
    if(modo==='recente') return String(isoData(b.data_publicacao)||'').localeCompare(String(isoData(a.data_publicacao)||''));
    if(modo==='prazo'){ return String(a.data_limite||'9999-12-31').localeCompare(String(b.data_limite||'9999-12-31')); }
    return scoreLead(b)-scoreLead(a);
  });
}
function render(){
  const f=filtros(); const vis=LEADS.filter(l=>passa(l,f)); const board=$('#board'); board.innerHTML='';
  for(const s of STAGES){
    const doS=ordenaLeads(vis.filter(l=>l.estagio===s.key)); const col=document.createElement('div'); col.className='col'; col.dataset.estagio=s.key;
    const mostra=doS.slice(0,80);
    col.innerHTML='<h2 style="color:'+s.cor+'">'+esc(s.label)+'<span class="hr"><span class="ren" data-est="'+s.key+'" title="renomear">✎</span><span class="c">'+doS.length+'</span></span></h2><div class="body">'+mostra.map(cardHTML).join('')+(doS.length>mostra.length?('<div class="status">+ '+(doS.length-mostra.length)+' (filtre)</div>'):'')+'</div>';
    board.appendChild(col);
  }
  ligar();
  document.querySelectorAll('.ren').forEach(r=> r.onclick=e=>{ e.stopPropagation(); const s=STAGES.find(x=>x.key===r.dataset.est); renomearCol(r.dataset.est, s?s.label:''); });
  $('#status').textContent=vis.length+' de '+LEADS.length+' leads';
}
function ligar(){
  document.querySelectorAll('.lead').forEach(c=>{
    c.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',c.dataset.id));
    c.addEventListener('click',e=>{ if(e.target.closest('a,button,.canais')) return; abrirCard(c.dataset.id); });
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>e.preventDefault());
    col.addEventListener('drop',async e=>{ e.preventDefault(); const id=e.dataTransfer.getData('text/plain'); const estagio=col.dataset.estagio; const l=LEADS.find(x=>x.id===id); if(!l||l.estagio===estagio) return; l.estagio=estagio; render(); await moverLead(id,estagio); });
  });
}
function leadDe(id){ return LEADS.find(l=>l.id===id); }

// ===== MUTAÇÕES (Supabase) ====================================================
async function moverLead(id,estagio){ await sb.from('leads').update({estagio, atualizado_em:new Date().toISOString()}).eq('id',id); await sb.from('interacoes').insert({id:novoId(), lead_id:id, tipo:'mover', estagio, quando:new Date().toISOString()}); }
async function setData(id,v){ await sb.from('leads').update({data_entrega:v||null, atualizado_em:new Date().toISOString()}).eq('id',id); const l=leadDe(id); if(l) l.data_entrega=v||null; }
async function toggleEtq(id,etq,on){ const l=leadDe(id); let arr=(l.etiquetas||[]).slice(); if(on){ if(!arr.includes(etq)) arr.push(etq); } else arr=arr.filter(x=>x!==etq); l.etiquetas=arr; await sb.from('leads').update({etiquetas:arr, atualizado_em:new Date().toISOString()}).eq('id',id); }
async function carregarInteracoes(id){ const { data } = await sb.from('interacoes').select('*').eq('lead_id',id).order('quando'); return data||[]; }
async function comentar(id,nota){ await sb.from('interacoes').insert({id:novoId(), lead_id:id, tipo:'nota', nota, quando:new Date().toISOString()}); }
async function editarComent(intId,nota){ await sb.from('interacoes').update({nota, editado_em:new Date().toISOString()}).eq('id',intId); }
async function removerComent(intId){ await sb.from('interacoes').delete().eq('id',intId); }
// DESCARTAR = soft delete: sai do quadro mas fica no banco (não volta na reimportação de terça)
async function excluirLead(l){
  if(!confirm('Descartar este lead?\n\nEle sai do quadro, mas continua no banco (por isso NÃO volta em futuras importações). Dá pra restaurar depois em "Situação: descartados".')) return;
  await sb.from('leads').update({ descartado:true, atualizado_em:new Date().toISOString() }).eq('id',l.id);
  l.descartado=true; const i=LEADS.findIndex(x=>x.id===l.id); if(i>=0) LEADS[i].descartado=true;
  fecharCard(); render();
}
async function restaurarLead(l){
  await sb.from('leads').update({ descartado:false, atualizado_em:new Date().toISOString() }).eq('id',l.id);
  l.descartado=false; const i=LEADS.findIndex(x=>x.id===l.id); if(i>=0) LEADS[i].descartado=false;
  fecharCard(); render();
}

// ===== ENRIQUECIMENTO EM LOTE (BrasilAPI, PJ/MEI) =============================
function mapEnriq(d, cnpj){
  const fone=[d.ddd_telefone_1,d.ddd_telefone_2].map(x=>String(x||'').replace(/\D/g,'')).filter(x=>x.length>=10)[0]||null;
  return { cnpj:String(d.cnpj||cnpj).replace(/\D/g,''), razaoSocial:d.razao_social||null, nomeFantasia:d.nome_fantasia||null,
    telefone:fone, email:(d.email||'').trim()||null, cnae:d.cnae_fiscal_descricao||null,
    situacao:d.descricao_situacao_cadastral||null, abertura:d.data_inicio_atividade||null,
    endereco:[d.logradouro,d.numero,d.bairro,d.municipio,d.uf].filter(Boolean).join(', ')||null,
    socios:(d.qsa||[]).map(s=>s.nome_socio).filter(Boolean), fonte:'brasilapi', atualizadoEm:new Date().toISOString() };
}
async function enriquecerLote(){
  const f=filtros(); const vis=LEADS.filter(l=>passa(l,f));
  const alvos=vis.filter(l=>!jaEnriquecido(l) && cnpjDoLead(l));
  if(!alvos.length){ alert('Nenhum lead PJ/MEI com CNPJ e ainda sem enriquecimento no filtro atual.\nDica: filtre por uma publicação e/ou por Pessoa: PJ.'); return; }
  const mins=Math.max(1,Math.ceil(alvos.length*1.25/60));
  if(!confirm('Enriquecer '+alvos.length+' leads (PJ/MEI) pela BrasilAPI?\nLeva ~'+mins+' min. Mantenha esta aba aberta; pode acompanhar no rodapé.')) return;
  const bt=$('#btEnriq'); bt.disabled=true; const st=$('#status'); let ok=0, semDados=0, erro=0;
  for(let i=0;i<alvos.length;i++){
    const l=alvos[i]; const cnpj=cnpjDoLead(l);
    st.textContent='enriquecendo '+(i+1)+'/'+alvos.length+' · '+ok+' com dados, '+semDados+' sem, '+erro+' erro';
    try{
      const r=await fetch('https://brasilapi.com.br/api/cnpj/v1/'+cnpj);
      if(r.status===429){ await new Promise(x=>setTimeout(x,5000)); i--; continue; }
      if(!r.ok){ semDados++; }
      else{ const d=await r.json(); const enr=mapEnriq(d,cnpj); const patch={ enriquecimento:enr, tipo_pessoa:'PJ', atualizado_em:new Date().toISOString() };
        await sb.from('leads').update(patch).eq('id',l.id); Object.assign(l,patch); ok++; }
    }catch(e){ erro++; }
    await new Promise(x=>setTimeout(x,1250));
    if((i+1)%15===0) render();
  }
  bt.disabled=false; render();
  st.textContent='Enriquecimento concluído: '+ok+' com dados, '+semDados+' sem dados, '+erro+' erro.';
}
$('#btEnriq').addEventListener('click', enriquecerLote);

function funilHTML(){
  const cont={}; LEADS.forEach(l=>cont[l.estagio]=(cont[l.estagio]||0)+1);
  const max=Math.max(1,...STAGES.map(s=>cont[s.key]||0));
  let h=STAGES.map(s=>hbar(s.label, cont[s.key]||0, max, s.key==='ganho'?'ok':(s.key==='perdido'?'hot':''))).join('');
  const abord=['abordagem','respondeu','negociacao','ganho','perdido'].reduce((a,k)=>a+(cont[k]||0),0);
  const resp=['respondeu','negociacao','ganho'].reduce((a,k)=>a+(cont[k]||0),0);
  const ganho=cont['ganho']||0;
  const pct=(a,b)=>b>0?Math.round(a/b*100)+'%':'—';

let CONS=null, CONS_INIT=false;
function pillSit(s){ s=(s||'').toLowerCase(); if(/em vigor/.test(s)) return 'bom'; if(/exame|aguarda|sobrestad|oposi|public|recurso|exig/.test(s)) return 'alerta'; if(/extint|arquiv|indefer|nulidad|cancel|cadu/.test(s)) return 'ruim'; return 'neutro'; }

async function buscarMarca(){
  const marca=$('#qMarca').value.trim(); if(!marca) return;
  $('#qStatus').textContent='consultando o INPI…'; $('#qWrap').innerHTML='';
  const { data, error }=await sb.functions.invoke('consulta', { body:{ action:'buscar', marca, classe:$('#qClasse').value.trim(), modo:$('#qModo').value } });
  if(error||!data||data.erro){ $('#qStatus').textContent='erro: '+((data&&data.erro)||(error&&error.message)||'falha'); return; }

let PROC_INIT=false, PROCD=null;
function situacao(p){ const d=(p.despachos||[])[0]; return d?{nome:d.nome,tom:d.tom}:{nome:'—',tom:'neutro'}; }
function proxPrazo(p){
  const d=(p.despachos||[]).find(x=>/IPAS009|IPAS756/.test(x.codigo||'')||/publica.*oposi/i.test(x.nome||''));
  if(d&&d.data){ const iso=d.data.split('/').reverse().join('-'); const dt=new Date(iso+'T00:00:00'); dt.setDate(dt.getDate()+60); const dr=Math.round((dt-new Date().setHours(0,0,0,0))/86400000); return {txt:'Oposição '+dt.toLocaleDateString('pt-BR'), dr}; }
  if(p.datas&&p.datas.vigencia) return {txt:'Vigência '+p.datas.vigencia, dr:null};
  return null;
}
function resumoInteligente(p){
  const s=situacao(p), pz=proxPrazo(p), d0=(p.despachos||[])[0];
  let t='Marca '+(p.marca||'(nominativa, sem nome no XML)')+(p.apresentacao?(' ('+p.apresentacao+')'):'')+', '+((p.areas||[]).join(' / ')||'classe não informada')+'. ';
  t+='Titular '+(p.titular||'—')+(p.uf?(' ('+p.uf+')'):'')+', procurador '+(p.procurador||'—')+'. ';
  t+='Situação atual: '+s.nome+(d0?(' — RPI '+d0.revista+' · '+(d0.data||'')):'')+'. ';
  if(pz&&pz.dr!=null) t+='Prazo: '+pz.txt+(pz.dr<0?' (VENCIDO)':(' (faltam '+pz.dr+' dias)'))+'.';
  return t;
}

  automacao:['⚙️','Automação','Motor de gatilhos → ações (ex.: mover no funil dispara e-mail; nova publicação cria tarefa). É a Fase C/D.'],
};
function placeholderMod(v){ const m=MOD_INFO[v]||['🚧','Módulo','Em construção.']; return '<div class="constru"><div class="em">'+m[0]+'</div><span class="tag">em construção · próxima etapa</span><h3>'+m[1]+'</h3><p>'+m[2]+'</p></div>'; }

// ===== TABS ===================================================================
const VIEWS=['leads','processos','movimentacoes','tarefas','pessoas','dashboard','carteira','consulta','financeiro','automacao'];
document.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on', x===t));
  const v=t.dataset.tab;
  VIEWS.forEach(k=> $('#view-'+k).style.display=(k===v?(k==='leads'?'flex':'block'):'none'));
  if(v==='dashboard' && !DASH_LOADED){ DASH_LOADED=true; renderDashboard(); }
  if(v==='carteira' && !CART){ renderCarteira(); }
  if(v==='consulta' && !CONS_INIT){ CONS_INIT=true; renderConsulta(); }
  if(v==='processos' && !PROC_INIT){ PROC_INIT=true; renderProcessos(); }
  if(MOD_INFO[v] && !$('#view-'+v).innerHTML.trim()){ $('#view-'+v).innerHTML=placeholderMod(v); }
});

// ===== START ==================================================================
if(SUPABASE_URL.indexOf('COLE_AQUI')===0){ $('#loginMsg').innerHTML='<div class="msg erro">Falta configurar a URL e a chave do Supabase no topo do arquivo.</div>'; }
if(!location.hash.includes('type=recovery')){ sb.auth.getSession().then(({data:{session}})=>{ if(session) entrar(); }); }
</script>
</body>
</html>
